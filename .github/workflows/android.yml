name: Build Android APK

# Builds a signed, installable APK in the cloud — no local Android toolchain
# and no Google Play account needed. Download it from the run's Artifacts and
# sell it as a direct download (e.g. on itch.io) or sideload to a device.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/android.yml'
      - 'index.html'
      - 'style.css'
      - 'src/**'
      - 'lib/**'
      - 'manifest.webmanifest'
      - 'sw.js'
      - 'icons/**'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Capacitor dependencies
        working-directory: mobile
        run: npm install

      - name: Assemble web bundle
        working-directory: mobile
        run: node copy-web.js

      - name: Add Android platform
        working-directory: mobile
        run: npx cap add android

      - name: Sync web assets into Android
        working-directory: mobile
        run: npx cap sync android

      - name: Lock landscape orientation
        working-directory: mobile
        run: node patch-android.js

      - name: Generate app icons (best effort)
        working-directory: mobile
        continue-on-error: true
        run: npx @capacitor/assets generate --android --assetPath assets

      - name: Build release APK (unsigned)
        working-directory: mobile/android
        run: ./gradlew assembleRelease

      - name: Sign APK
        working-directory: mobile
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          BT="$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)"
          APKSIGNER="$ANDROID_HOME/build-tools/$BT/apksigner"
          ZIPALIGN="$ANDROID_HOME/build-tools/$BT/zipalign"
          UNSIGNED="$(find android/app/build/outputs/apk/release -name '*-unsigned.apk' | head -1)"
          echo "Unsigned APK: $UNSIGNED"

          if [ -n "${KEYSTORE_BASE64:-}" ]; then
            echo "Signing with keystore from repository secrets."
            echo "$KEYSTORE_BASE64" | base64 -d > ks.jks
            STOREPASS="$KEYSTORE_PASSWORD"; KEYPASS="$KEY_PASSWORD"; ALIAS="$KEY_ALIAS"
          else
            echo "::warning::No KEYSTORE_BASE64 secret set — generating a one-off keystore for this build. To ship updates that install over an existing copy, save the keystore + credentials from this run's artifacts and add them as repo secrets (KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD)."
            STOREPASS="$(openssl rand -hex 16)"; KEYPASS="$STOREPASS"; ALIAS="tigertrail"
            keytool -genkeypair -v -keystore ks.jks -alias "$ALIAS" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$STOREPASS" -keypass "$KEYPASS" \
              -dname "CN=Tiger Trail, O=Dr. Cole, C=US"
            {
              echo "KEYSTORE_PASSWORD=$STOREPASS"
              echo "KEY_ALIAS=$ALIAS"
              echo "KEY_PASSWORD=$KEYPASS"
            } > keystore-credentials.txt
            base64 -w0 ks.jks > keystore-base64.txt
          fi

          "$ZIPALIGN" -f 4 "$UNSIGNED" aligned.apk
          "$APKSIGNER" sign --ks ks.jks --ks-key-alias "$ALIAS" \
            --ks-pass "pass:$STOREPASS" --key-pass "pass:$KEYPASS" \
            --out "Tiger-Trail.apk" aligned.apk
          "$APKSIGNER" verify --verbose "Tiger-Trail.apk"
          echo "Signed APK ready: mobile/Tiger-Trail.apk"

      - name: Upload APK + (if generated) keystore
        uses: actions/upload-artifact@v4
        with:
          name: tiger-trail-android
          path: |
            mobile/Tiger-Trail.apk
            mobile/keystore-base64.txt
            mobile/keystore-credentials.txt
          if-no-files-found: error
